<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-width: 360px;
        margin: 0;
        background: #f7f8fa;
        color: #1d2430;
      }

      main {
        display: grid;
        gap: 12px;
        padding: 14px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 650;
        letter-spacing: 0;
      }

      .pill {
        align-self: start;
        border: 1px solid #cbd3df;
        border-radius: 999px;
        padding: 4px 8px;
        font-size: 12px;
        line-height: 1;
      }

      .pill[data-connected="true"] {
        border-color: #17803c;
        color: #146c35;
        background: #e7f6ec;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #171b22;
          color: #edf1f7;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>WebCLI</h1>
        <span id="connection" class="pill" data-connected="false">disconnected</span>
      </header>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
